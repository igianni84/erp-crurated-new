name: Test Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 3:00 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov
          ini-values: pcov.directory=app

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Debug PHP ini
        run: |
          echo "max_execution_time = $(php -r "echo ini_get('max_execution_time');")"
          echo "pcov.directory = $(php -r "echo ini_get('pcov.directory');")"
          echo "pcov.enabled = $(php -r "echo ini_get('pcov.enabled');")"
          echo "memory_limit = $(php -r "echo ini_get('memory_limit');")"
          echo "php.ini loaded = $(php -r "echo php_ini_loaded_file();")"

      - name: Force max_execution_time=0 in php.ini
        run: |
          PHP_INI=$(php -r "echo php_ini_loaded_file();")
          echo "max_execution_time=0" >> "$PHP_INI"
          echo "Verified: max_execution_time = $(php -r "echo ini_get('max_execution_time');")"

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
